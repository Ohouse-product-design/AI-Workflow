<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Workflow MD Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', system-ui, sans-serif;
      background: #fff;
      color: #1d1d1f;
      line-height: 1.7;
      padding: 48px;
      max-width: 960px;
      margin: 0 auto;
    }
    h1 { font-size: 28px; font-weight: 800; margin: 32px 0 16px; letter-spacing: -0.5px; }
    h2 { font-size: 22px; font-weight: 700; margin: 40px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #e5e5ea; }
    h3 { font-size: 18px; font-weight: 700; margin: 28px 0 8px; }
    h4 { font-size: 15px; font-weight: 700; margin: 20px 0 6px; }
    p { margin: 8px 0; font-size: 15px; }
    ul, ol { margin: 8px 0 8px 24px; font-size: 15px; }
    li { margin: 4px 0; }
    blockquote { border-left: 3px solid #007AFF; padding: 8px 16px; margin: 12px 0; background: #f5f7ff; color: #555; font-size: 14px; border-radius: 0 8px 8px 0; }
    code { background: #f0f0f5; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', monospace; }
    pre { background: #f5f5f7; padding: 16px; border-radius: 10px; overflow-x: auto; margin: 12px 0; }
    pre code { background: none; padding: 0; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 16px 0; border-radius: 10px; overflow: hidden; border: 1px solid #e5e5ea; font-size: 14px; }
    thead th { background: #f8f8fa; padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px; color: #86868b; text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid #e5e5ea; }
    tbody td { padding: 10px 14px; border-bottom: 1px solid #f0f0f2; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    a { color: #007AFF; text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr { border: none; border-top: 1px solid #e5e5ea; margin: 32px 0; }
    strong { font-weight: 700; }
    em { font-style: italic; color: #86868b; }
  </style>
</head>
<body>
  <div id="content">Loading...</div>
  <script>
    fetch('ai-workflow.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(e => {
        document.getElementById('content').innerHTML = '<p>Error loading MD file: ' + e.message + '</p>';
      });
  </script>
</body>
</html>
