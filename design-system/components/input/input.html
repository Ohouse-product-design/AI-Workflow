<!-- ODS Input Component — 상태별 HTML Snippet -->
<style>
  .ods-input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .ods-input-group__label {
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    color: #212529;
  }
  .ods-input {
    width: 100%;
    height: 44px;
    padding: 12px 16px;
    font-size: 16px;
    line-height: 24px;
    color: #212529;
    background: #FFFFFF;
    border: 1px solid #DEE2E6;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s ease;
    font-family: inherit;
    box-sizing: border-box;
  }
  .ods-input::placeholder { color: #ADB5BD; }
  .ods-input:focus { border-color: #228BE6; box-shadow: 0 0 0 2px rgba(34,139,230,0.15); }
  .ods-input--filled { background: #F8F9FA; }
  .ods-input--error { border-color: #FF6B6B; }
  .ods-input--error:focus { border-color: #FF6B6B; box-shadow: 0 0 0 2px rgba(255,107,107,0.15); }
  .ods-input:disabled {
    opacity: 0.4;
    background: #F1F3F5;
    cursor: not-allowed;
  }
  .ods-input-group__helper {
    font-size: 12px;
    line-height: 16px;
    color: #868E96;
  }
  .ods-input-group__error {
    font-size: 12px;
    line-height: 16px;
    color: #F03E3E;
  }

  /* Textarea */
  .ods-textarea {
    min-height: 100px;
    resize: vertical;
    padding: 12px 16px;
    font-size: 16px;
    line-height: 24px;
    color: #212529;
    background: #FFFFFF;
    border: 1px solid #DEE2E6;
    border-radius: 8px;
    outline: none;
    font-family: inherit;
    box-sizing: border-box;
    width: 100%;
  }
  .ods-textarea:focus { border-color: #228BE6; box-shadow: 0 0 0 2px rgba(34,139,230,0.15); }
</style>

<!-- Default -->
<div class="ods-input-group">
  <label class="ods-input-group__label" for="input-default">이메일</label>
  <input class="ods-input" id="input-default" type="email" placeholder="example@ohouse.com" />
  <span class="ods-input-group__helper">로그인에 사용할 이메일을 입력하세요</span>
</div>

<!-- Focus (CSS :focus로 자동 처리) -->
<div class="ods-input-group">
  <label class="ods-input-group__label" for="input-focus">닉네임</label>
  <input class="ods-input" id="input-focus" type="text" placeholder="닉네임을 입력하세요" />
</div>

<!-- Filled -->
<div class="ods-input-group">
  <label class="ods-input-group__label" for="input-filled">이메일</label>
  <input class="ods-input ods-input--filled" id="input-filled" type="email" value="user@ohouse.com" />
</div>

<!-- Error -->
<div class="ods-input-group">
  <label class="ods-input-group__label" for="input-error">비밀번호</label>
  <input class="ods-input ods-input--error" id="input-error" type="password" value="123" aria-invalid="true" aria-describedby="error-msg" />
  <span class="ods-input-group__error" id="error-msg">비밀번호는 8자 이상이어야 합니다</span>
</div>

<!-- Disabled -->
<div class="ods-input-group">
  <label class="ods-input-group__label" for="input-disabled">추천인 코드</label>
  <input class="ods-input" id="input-disabled" type="text" value="AUTO-GENERATED" disabled />
</div>

<!-- Textarea -->
<div class="ods-input-group">
  <label class="ods-input-group__label" for="textarea-default">리뷰 작성</label>
  <textarea class="ods-textarea" id="textarea-default" placeholder="상품 리뷰를 작성해주세요 (최소 20자)"></textarea>
  <span class="ods-input-group__helper">0 / 500자</span>
</div>
