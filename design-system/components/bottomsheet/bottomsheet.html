<!-- ODS BottomSheet Component — 타입별 HTML Snippet -->
<style>
  .ods-bottomsheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .ods-bottomsheet {
    background: #FFFFFF;
    border-radius: 12px 12px 0 0;
    width: 100%;
    max-height: 85vh;
    box-shadow: 0 -10px 20px rgba(0,0,0,0.08);
    animation: ods-sheet-up 0.3s ease;
    display: flex;
    flex-direction: column;
  }
  @keyframes ods-sheet-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .ods-bottomsheet__handle {
    display: flex;
    justify-content: center;
    padding: 12px 0 4px;
  }
  .ods-bottomsheet__handle-bar {
    width: 36px;
    height: 4px;
    background: #DEE2E6;
    border-radius: 2px;
  }
  .ods-bottomsheet__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 24px 16px;
  }
  .ods-bottomsheet__title {
    font-size: 20px;
    font-weight: 600;
    line-height: 28px;
    color: #212529;
    margin: 0;
  }
  .ods-bottomsheet__close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    margin-right: -12px;
    background: none;
    border: none;
    cursor: pointer;
    color: #868E96;
  }
  .ods-bottomsheet__body {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px;
    -webkit-overflow-scrolling: touch;
  }
  .ods-bottomsheet__footer {
    padding: 16px 24px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
    border-top: 1px solid #F1F3F5;
    display: flex;
    gap: 8px;
  }
  .ods-bottomsheet__footer .ods-btn { flex: 1; }

  /* Action List */
  .ods-bottomsheet__action-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .ods-bottomsheet__action-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 0;
    border-bottom: 1px solid #F1F3F5;
    font-size: 16px;
    color: #212529;
    cursor: pointer;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  .ods-bottomsheet__action-item:last-child { border-bottom: none; }
  .ods-bottomsheet__action-item--danger { color: #F03E3E; }
</style>

<!-- Default: 스크롤 가능한 콘텐츠 -->
<div class="ods-bottomsheet-backdrop" role="dialog" aria-modal="true" aria-labelledby="sheet-title-1">
  <div class="ods-bottomsheet">
    <div class="ods-bottomsheet__handle"><div class="ods-bottomsheet__handle-bar"></div></div>
    <div class="ods-bottomsheet__header">
      <h2 class="ods-bottomsheet__title" id="sheet-title-1">옵션 선택</h2>
      <button class="ods-bottomsheet__close" aria-label="닫기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="ods-bottomsheet__body">
      <p style="color: #495057; font-size: 14px; margin: 0 0 16px;">색상과 사이즈를 선택해주세요.</p>
      <!-- 콘텐츠 영역 -->
    </div>
    <div class="ods-bottomsheet__footer">
      <button class="ods-btn ods-btn--primary ods-btn--lg">선택 완료</button>
    </div>
  </div>
</div>

<!-- Action List (액션 목록) -->
<div class="ods-bottomsheet-backdrop" role="dialog" aria-modal="true" aria-labelledby="sheet-title-2">
  <div class="ods-bottomsheet">
    <div class="ods-bottomsheet__handle"><div class="ods-bottomsheet__handle-bar"></div></div>
    <div class="ods-bottomsheet__header">
      <h2 class="ods-bottomsheet__title" id="sheet-title-2">더보기</h2>
    </div>
    <div class="ods-bottomsheet__body">
      <ul class="ods-bottomsheet__action-list" role="menu">
        <li><button class="ods-bottomsheet__action-item" role="menuitem">수정하기</button></li>
        <li><button class="ods-bottomsheet__action-item" role="menuitem">공유하기</button></li>
        <li><button class="ods-bottomsheet__action-item" role="menuitem">신고하기</button></li>
        <li><button class="ods-bottomsheet__action-item ods-bottomsheet__action-item--danger" role="menuitem">삭제하기</button></li>
      </ul>
    </div>
  </div>
</div>
