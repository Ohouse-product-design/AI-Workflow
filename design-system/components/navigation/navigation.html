<!-- ODS Navigation Component — Bottom Nav + Top Bar -->
<style>
  /* Bottom Navigation (Mobile) */
  .ods-bottom-nav {
    display: flex;
    align-items: center;
    justify-content: space-around;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: #FFFFFF;
    border-top: 1px solid #E9ECEF;
    padding-bottom: env(safe-area-inset-bottom, 0);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    z-index: 300;
  }
  .ods-bottom-nav__item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 44px;
    min-height: 44px;
    justify-content: center;
    color: #868E96;
    text-decoration: none;
    font-size: 11px;
    font-weight: 500;
    line-height: 14px;
    position: relative;
    background: none;
    border: none;
    cursor: pointer;
  }
  .ods-bottom-nav__item--active { color: #212529; }
  .ods-bottom-nav__item svg { width: 24px; height: 24px; }
  .ods-bottom-nav__badge {
    position: absolute;
    top: 4px;
    right: 4px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    background: #FF6B6B;
    color: #FFFFFF;
    font-size: 10px;
    font-weight: 700;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Top Navigation Bar */
  .ods-top-bar {
    display: flex;
    align-items: center;
    height: 56px;
    padding: 0 16px;
    background: #FFFFFF;
    border-bottom: 1px solid #E9ECEF;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .ods-top-bar__back {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    margin-left: -12px;
    background: none;
    border: none;
    cursor: pointer;
    color: #212529;
  }
  .ods-top-bar__title {
    flex: 1;
    font-size: 17px;
    font-weight: 600;
    line-height: 24px;
    color: #212529;
    text-align: center;
    margin: 0;
  }
  .ods-top-bar__action {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    margin-right: -12px;
    background: none;
    border: none;
    cursor: pointer;
    color: #212529;
  }
</style>

<!-- Top Bar: 기본 (뒤로가기 + 타이틀 + 액션) -->
<header class="ods-top-bar">
  <button class="ods-top-bar__back" aria-label="뒤로 가기">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 18l-6-6 6-6" />
    </svg>
  </button>
  <h1 class="ods-top-bar__title">상품 상세</h1>
  <button class="ods-top-bar__action" aria-label="공유">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13" />
    </svg>
  </button>
</header>

<!-- Top Bar: 타이틀만 -->
<header class="ods-top-bar">
  <h1 class="ods-top-bar__title" style="text-align: left;">홈</h1>
</header>
